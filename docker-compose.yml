services:
  todo-db:
    image: postgres:16
    container_name: todo-db
    environment:
      POSTGRES_DB: todolist_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433:5432"
    volumes:
      - todo-db-data:/var/lib/postgresql/data
    networks:
      - todo-network

  todo-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-backend
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://todo-db:5432/todolist_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
    depends_on:
      - todo-db
    networks:
      - todo-network

  todo-frontend:
    build:
      context: ./todolist-fe
      dockerfile: Dockerfile
    container_name: todo-frontend
    ports:
      - "3000:80"
    depends_on:
      - todo-backend
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge

volumes:
  todo-db-data: